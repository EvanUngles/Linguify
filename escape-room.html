function getRandomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

// Ensure at least one key is in the jail and that jail key is visible from the start
function enforceJailPresence() {
    // Ensure keys do not spawn in the same place
    function spotFor(loc) {
        if (!loc) return null;
        if (loc.includes('Hole')) return 'Hole';
        if (loc.includes('Jail')) return 'Jail';
        if (loc.includes('LockBox')) return 'LockBox';
        if (loc.includes('Secret')) return 'Secret';
        return loc;
    }
    // If both ended up in the same spot, re-roll red until different
    while (spotFor(blueKeyLocation) && spotFor(redKeyLocation) && spotFor(blueKeyLocation) === spotFor(redKeyLocation)) {
        
        if (redKeyLocation) {
            const prev = document.getElementById(redKeyLocation);
            if (prev) prev.style.visibility = "hidden";
        }
        // pick a new red location
        const redChoices = ['SecretRedKey','RedKeyHole','RedKeyJail'];
        redKeyLocation = redChoices[getRandomInt(0, redChoices.length - 1)];
        if (redKeyLocation === 'RedKeyJail') {
            const el = document.getElementById('RedKeyJail');
            if (el) el.style.visibility = "visible";
        }
    }
    //one key is accessible from the start: if neither is in jail, make red visible in jail
    const blueInJail = blueKeyLocation === 'BlueKeyJail';
    const redInJail = redKeyLocation === 'RedKeyJail';
    if (!blueInJail && !redInJail) {
        if (redKeyLocation) {
            const prev = document.getElementById(redKeyLocation);
            if (prev) prev.style.visibility = "hidden";
        }
        redKeyLocation = 'RedKeyJail';
        const jailEl = document.getElementById('RedKeyJail');
        if (jailEl) jailEl.style.visibility = "visible";
    }
}

var notePlacement = {}; // maps spot -> question variable name
var noteTexts = {
    'ComputerQuestion': ComputerQuestion,

    'GreenComboLockQuestion': GreenComboLockQuestion,
    'BlueComboLockQuestion': BlueComboLockQuestion,
    'JailQuestion': JailQuestion
};

function placeNotesRandomizer() {
    // available spots
    const spots = ['Carpet','Plant','Hole','Paintings','LockBox','SecretRoom'];
    // clear any previous placement
    Object.keys(notePlacement).forEach(k => delete notePlacement[k]);

    // questions and constrained allowed spots
    const questionToAllowed = {
        'ComputerQuestion': ['Carpet','Plant','Paintings'],
        'JailQuestion': ['SecretRoom','Hole','Carpet','Plant','Paintings'],
        'ComboLockQuestion': spots.slice(),
        'GreenComboLockQuestion': spots.slice(),
        'BlueComboLockQuestion': spots.slice()
    };

    
    // chooses spot based on order of constraints and pick a random allowed spot that's still available
    const questionsOrder = ['ComputerQuestion','JailQuestion','ComboLockQuestion','GreenComboLockQuestion','BlueComboLockQuestion'];
    const availableSpots = spots.slice();
    for (const q of questionsOrder) {
        const allowed = (questionToAllowed[q] || spots.slice()).filter(s => availableSpots.includes(s));
        let pick;
        if (allowed.length > 0) {
            pick = allowed[getRandomInt(0, allowed.length - 1)];
        } else if (availableSpots.length > 0) {
            pick = availableSpots[getRandomInt(0, availableSpots.length - 1)];
        } else {
            pick = spots[getRandomInt(0, spots.length - 1)];
        }
        notePlacement[pick] = q;
        // remove pick from availableSpots for unique placements
        const idx = availableSpots.indexOf(pick);
        if (idx !== -1) availableSpots.splice(idx,1);
    }

}

function inspectHole() { //if holle  is visible and note is placed there it updates the table and user
